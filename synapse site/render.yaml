services:
  - type: web
    name: synapse-site
    runtime: node
    plan: starter
    buildCommand: npm ci
    startCommand: npm start
    autoDeploy: true
    disk:
      name: synapse-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: BASE_URL
        sync: false
      - key: DATABASE_PATH
        value: /var/data/synapse-auth.db
      - key: SESSION_SECRET
        generateValue: true
      - key: SESSION_COOKIE_NAME
        value: synapse.sid
      - key: SESSION_TTL_MS
        value: "86400000"
      - key: BCRYPT_ROUNDS
        value: "12"
      - key: EMAIL_VERIFICATION_TTL_MS
        value: "86400000"
      - key: EMAIL_FROM
        sync: false
      - key: SECURE_COOKIES
        value: "true"
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_USERNAME
        value: Admin
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
